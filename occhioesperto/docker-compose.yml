services:
  occhioesperto:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: occhioesperto
    ports:
      - "3000:3000"
    volumes:
      - occhioesperto_data:/app/data
      - occhioesperto_uploads:/app/uploads
    env_file:
      - .env
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRICE_4_99=${STRIPE_PRICE_4_99}
      - STRIPE_PRICE_9_99=${STRIPE_PRICE_9_99}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  occhioesperto_data:
    name: occhioesperto_data
  occhioesperto_uploads:
    name: occhioesperto_uploads